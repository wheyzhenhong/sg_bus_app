<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SG Bus Arrivals</title>

  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SG Bus">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚍</text></svg>">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #14142b;
      --surface: #1f1f3d;
      --surface-2: #2a2a4f;
      --line: #34345c;
      --ink: #f2f2fa;
      --muted: #9a9ac4;
      --accent: #ffd23f;       /* SG bus-stop sign yellow */
      --accent-ink: #1a1a2e;
      --green: #4ade80;
      --amber: #fbbf24;
      --red: #f87171;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 40px;
    }
    .top {
      padding: 28px 20px 18px;
      border-bottom: 1px solid var(--line);
    }
    .brand {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .top h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
    .top p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .search-wrap { padding: 18px 20px 6px; }
    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 4px 6px 4px 16px;
      transition: border-color .15s;
    }
    .search:focus-within { border-color: var(--accent); }
    .search input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--ink);
      font-size: 17px;
      padding: 14px 0;
    }
    .search input::placeholder { color: var(--muted); }
    .search button {
      background: var(--accent);
      color: var(--accent-ink);
      border: none;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
    }
    .search button:active { transform: scale(0.97); }
    .hint { font-size: 12px; color: var(--muted); padding: 8px 4px 0; line-height: 1.5; }

    .results { padding: 8px 20px; }

    /* status / empty / error */
    .note {
      text-align: center;
      padding: 40px 16px;
      color: var(--muted);
    }
    .note .big { font-size: 40px; margin-bottom: 10px; }
    .note.error { color: var(--red); }
    .spinner {
      width: 26px; height: 26px;
      border: 3px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 30px auto;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin: 14px 2px 12px;
    }
    .result-head .title { font-size: 18px; font-weight: 700; }
    .result-head .sub { font-size: 12px; color: var(--muted); }
    .refresh {
      background: var(--surface-2);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    /* arrival rows */
    .arr {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .svc {
      background: var(--accent);
      color: var(--accent-ink);
      font-weight: 800;
      font-size: 15px;
      border-radius: 8px;
      padding: 8px 10px;
      min-width: 56px;
      text-align: center;
    }
    .times { flex: 1; display: flex; gap: 18px; }
    .time .n { font-size: 20px; font-weight: 800; }
    .time .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .time .n.soon { color: var(--green); }
    .arr .none { color: var(--muted); font-size: 13px; }

    /* route stop picker */
    .dir-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent);
      margin: 18px 2px 8px;
      font-weight: 700;
    }
    .stop {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .stop:active { background: var(--surface-2); }
    .stop .nm { font-size: 14px; font-weight: 600; }
    .stop .rd { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .stop .code { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

    .back {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 14px;
      cursor: pointer;
      padding: 6px 2px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="brand">Singapore · Live</div>
    <h1>Bus Arrivals</h1>
    <p>Real-time timings from LTA</p>
  </div>

  <div class="search-wrap">
    <div class="search">
      <span style="font-size:18px;">🔎</span>
      <input id="q" type="text" inputmode="text" autocomplete="off"
             placeholder="Bus stop code or bus number"
             enterkeyhint="search">
      <button id="go">Search</button>
    </div>
    <div class="hint">Type a 5-digit stop code (e.g. <b>83139</b>) for live arrivals, or a bus number (e.g. <b>15</b>) to pick your stop.</div>
  </div>

  <div class="results" id="results">
    <div class="note">
      <div class="big">🚍</div>
      <div>Search a bus stop or bus number to begin.</div>
    </div>
  </div>

  <script>
    const $q = document.getElementById('q');
    const $go = document.getElementById('go');
    const $results = document.getElementById('results');

    let lastArrivalStop = null;   // for the refresh button

    function show(html) { $results.innerHTML = html; }
    function loading(msg) { show(`<div class="spinner"></div><div class="note">${msg || 'Loading…'}</div>`); }
    function error(msg) { show(`<div class="note error"><div class="big">⚠️</div><div>${msg}</div></div>`); }

    function loadClass(load) {
      // LTA load codes: SEA = seats available, SDA = standing, LSD = limited standing
      return '';
    }

    async function call(query) {
      const res = await fetch(query);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong.');
      return data;
    }

    function renderArrivals(data) {
      lastArrivalStop = data.stopCode;
      const info = data.stopInfo;
      const title = info ? info.name : `Stop ${data.stopCode}`;
      const sub = info ? `${info.road} · ${data.stopCode}` : '';

      let html = `
        <div class="result-head">
          <div>
            <div class="title">${title}</div>
            <div class="sub">${sub}</div>
          </div>
          <button class="refresh" id="refresh">↻ Refresh</button>
        </div>`;

      if (!data.services.length) {
        html += `<div class="note"><div class="big">🌙</div><div>No buses arriving now. Service may not be operating at this hour.</div></div>`;
      } else {
        for (const s of data.services) {
          const times = s.arrivals.length
            ? s.arrivals.map((m, i) => `
                <div class="time">
                  <div class="n ${m <= 2 ? 'soon' : ''}">${m === 0 ? 'Arr' : m}</div>
                  <div class="l">${i === 0 ? (m === 0 ? 'now' : 'min') : 'then'}</div>
                </div>`).join('')
            : `<span class="none">No estimate</span>`;
          html += `<div class="arr"><div class="svc">${s.service}</div><div class="times">${times}</div></div>`;
        }
      }
      show(html);
      const r = document.getElementById('refresh');
      if (r) r.onclick = () => searchStop(data.stopCode);
    }

    function renderRoute(data) {
      let html = `
        <button class="back" id="back">← New search</button>
        <div class="result-head">
          <div><div class="title">Bus ${data.service}</div>
          <div class="sub">Tap the stop you're waiting at</div></div>
        </div>`;

      const dirs = Object.keys(data.directions);
      for (const d of dirs) {
        if (dirs.length > 1) html += `<div class="dir-label">Direction ${d}</div>`;
        for (const st of data.directions[d]) {
          html += `
            <div class="stop" data-code="${st.stopCode}">
              <div>
                <div class="nm">${st.name}</div>
                <div class="rd">${st.road}</div>
              </div>
              <div class="code">${st.stopCode}</div>
            </div>`;
        }
      }
      show(html);
      document.getElementById('back').onclick = () => { $q.value = ''; $q.focus(); resetHome(); };
      document.querySelectorAll('.stop').forEach((el) => {
        el.onclick = () => searchStop(el.dataset.code);
      });
    }

    function resetHome() {
      show(`<div class="note"><div class="big">🚍</div><div>Search a bus stop or bus number to begin.</div></div>`);
    }

    async function searchStop(code) {
      loading('Getting live arrivals…');
      try {
        const data = await call(`/bus?action=arrivals&stop=${encodeURIComponent(code)}`);
        renderArrivals(data);
      } catch (e) { error(e.message); }
    }

    async function searchService(service) {
      loading('Finding stops on this route…');
      try {
        const data = await call(`/bus?action=route&service=${encodeURIComponent(service)}`);
        renderRoute(data);
      } catch (e) { error(e.message); }
    }

    function doSearch() {
      const raw = $q.value.trim();
      if (!raw) return;
      // 5 digits => bus stop code. Otherwise => bus service number.
      if (/^\d{5}$/.test(raw)) {
        searchStop(raw);
      } else {
        searchService(raw.toUpperCase());
      }
    }

    $go.onclick = doSearch;
    $q.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

    // ----- PWA install (optional, same as before) -----
    const manifest = {
      name: 'SG Bus Arrivals', short_name: 'SG Bus', start_url: '.',
      display: 'standalone', background_color: '#14142b', theme_color: '#14142b',
      icons: [{ src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2314142b'/><text y='.9em' x='8' font-size='78'>🚍</text></svg>", sizes: 'any', type: 'image/svg+xml' }]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const link = document.createElement('link');
    link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  </script>
</body>
</html>
