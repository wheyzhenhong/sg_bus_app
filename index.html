<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bus Timing</title>

  <!-- PWA: tells the phone this can be installed as an app -->
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Bus Timing">

  <!-- Manifest is embedded below via JavaScript so everything stays in ONE file -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: #007AFF;
      --warning: #FF9500;
      --bg: #F5F7FA;
      --card: #FFFFFF;
      --text: #1a1a1a;
      --subtext: #666;
      --border: #E5E5EA;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 30px;
    }
    .header {
      background: var(--primary);
      color: white;
      padding: 24px 20px 20px;
    }
    .header h1 { font-size: 26px; margin-bottom: 4px; }
    .header p { font-size: 14px; opacity: 0.85; }

    .search-box {
      margin: 16px;
      display: flex;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
    }
    .search-box input {
      border: none;
      outline: none;
      flex: 1;
      font-size: 16px;
      background: transparent;
    }

    .tabs {
      display: flex;
      margin: 0 16px;
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      background: var(--card);
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: var(--subtext);
      transition: 0.2s;
    }
    .tab-btn.active { background: var(--primary); color: white; }

    .content { display: none; padding: 16px; }
    .content.show { display: block; }
    .content h2 { font-size: 18px; margin-bottom: 12px; }

    .bus-card {
      background: var(--card);
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-left { display: flex; align-items: center; gap: 12px; }
    .route-num {
      background: var(--primary);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 13px;
      min-width: 44px;
      text-align: center;
    }
    .route-name { font-weight: 600; font-size: 14px; }
    .route-dest { font-size: 12px; color: var(--subtext); margin-top: 2px; }
    .arrival-time { font-size: 18px; font-weight: 700; color: var(--primary); }
    .arrival-time small { font-size: 12px; font-weight: 500; }
    .favorite-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px; }

    .stop-list { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .stop-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 13px;
    }
    .stop-item .dot { color: var(--primary); margin-right: 8px; }
    .stop-time { color: var(--subtext); }

    .empty { text-align: center; padding: 40px 20px; color: var(--subtext); }
    .empty .icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }

    .install-banner {
      display: none;
      margin: 16px;
      padding: 14px;
      background: #fff;
      border: 1px solid var(--primary);
      border-radius: 10px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .install-banner button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    .updated { font-size: 11px; color: var(--subtext); text-align: center; margin-top: 8px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🚌 Bus Timing</h1>
    <p>Real-time arrivals</p>
  </div>

  <!-- Install prompt (shows on Android Chrome when installable) -->
  <div class="install-banner" id="installBanner">
    <span>📲 Install this app on your phone</span>
    <button onclick="installApp()">Install</button>
  </div>

  <div class="search-box">
    <span style="margin-right:8px;">🔍</span>
    <input type="text" id="search" placeholder="Search route or stop..." oninput="render()">
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="arrivals" onclick="switchTab('arrivals')">Arrivals</button>
    <button class="tab-btn" data-tab="routes" onclick="switchTab('routes')">Routes</button>
    <button class="tab-btn" data-tab="favorites" onclick="switchTab('favorites')">Favorites</button>
  </div>

  <div id="arrivals" class="content show"></div>
  <div id="routes" class="content"></div>
  <div id="favorites" class="content"></div>

  <script>
    // ---------- DATA (replace with a real API later) ----------
    const buses = {
      '101': { name: 'Route 101', dest: 'Central → Airport', stops: [
        ['Central Station', 2], ['Market Square', 7], ['City Hospital', 12], ['Airport Terminal', 22]
      ]},
      '205': { name: 'Route 205', dest: 'East Loop', stops: [
        ['East Station', 5], ['Shopping Mall', 10], ['Park Avenue', 15], ['University', 20]
      ]},
      '310': { name: 'Route 310', dest: 'North Express', stops: [
        ['Downtown Hub', 3], ['North Gate', 8], ['Industrial Area', 18]
      ]},
    };

    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    let expanded = null;
    let currentTab = 'arrivals';

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.content').forEach(c => c.classList.remove('show'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tab).classList.add('show');
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      render();
    }

    function toggleFav(id, e) {
      e.stopPropagation();
      favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id];
      localStorage.setItem('favorites', JSON.stringify(favorites));
      render();
    }

    function toggleExpand(id) {
      expanded = expanded === id ? null : id;
      render();
    }

    function matchesSearch(id, bus, q) {
      if (!q) return true;
      q = q.toLowerCase();
      return id.includes(q) || bus.name.toLowerCase().includes(q) ||
        bus.dest.toLowerCase().includes(q) ||
        bus.stops.some(s => s[0].toLowerCase().includes(q));
    }

    function arrivalCard(id, bus) {
      return `
        <div class="bus-card">
          <div class="card-top">
            <div class="card-left">
              <div class="route-num">${id}</div>
              <div>
                <div class="route-name">${bus.name}</div>
                <div class="route-dest">${bus.dest}</div>
              </div>
            </div>
            <div class="arrival-time">${bus.stops[0][1]} <small>min</small></div>
          </div>
        </div>`;
    }

    function routeCard(id, bus) {
      const isFav = favorites.includes(id);
      const isOpen = expanded === id;
      return `
        <div class="bus-card" onclick="toggleExpand('${id}')">
          <div class="card-top">
            <div class="card-left">
              <div class="route-num">${id}</div>
              <div>
                <div class="route-name">${bus.name}</div>
                <div class="route-dest">${bus.dest}</div>
              </div>
            </div>
            <button class="favorite-btn" onclick="toggleFav('${id}', event)">${isFav ? '⭐' : '☆'}</button>
          </div>
          ${isOpen ? `<div class="stop-list">${bus.stops.map(s =>
            `<div class="stop-item"><span><span class="dot">●</span>${s[0]}</span><span class="stop-time">${s[1]} min</span></div>`
          ).join('')}</div>` : ''}
        </div>`;
    }

    function emptyState(icon, msg) {
      return `<div class="empty"><div class="icon">${icon}</div><div>${msg}</div></div>`;
    }

    function render() {
      const q = document.getElementById('search').value;
      const entries = Object.entries(buses).filter(([id, bus]) => matchesSearch(id, bus, q));

      // Arrivals
      document.getElementById('arrivals').innerHTML =
        '<h2>Next Buses</h2>' +
        (entries.length ? entries.map(([id, bus]) => arrivalCard(id, bus)).join('')
                        : emptyState('🚌', 'No buses found'));

      // Routes
      document.getElementById('routes').innerHTML =
        `<h2>${q ? 'Search Results' : 'All Routes'}</h2>` +
        (entries.length ? entries.map(([id, bus]) => routeCard(id, bus)).join('')
                        : emptyState('🔍', 'No routes match'));

      // Favorites
      const favEntries = entries.filter(([id]) => favorites.includes(id));
      document.getElementById('favorites').innerHTML =
        '<h2>Your Favorites</h2>' +
        (favEntries.length ? favEntries.map(([id, bus]) => routeCard(id, bus)).join('')
                           : emptyState('⭐', 'No favorites yet. Tap ☆ on a route to add it!'));
    }

    render();

    // ---------- PWA INSTALL LOGIC ----------
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').style.display = 'flex';
    });
    function installApp() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('installBanner').style.display = 'none';
      });
    }

    // ---------- MANIFEST (embedded so it's one file) ----------
    const manifest = {
      name: "Bus Timing",
      short_name: "Bus Timing",
      start_url: ".",
      display: "standalone",
      background_color: "#F5F7FA",
      theme_color: "#007AFF",
      icons: [{
        src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23007AFF'/><text y='.9em' x='5' font-size='80'>🚌</text></svg>",
        sizes: "any",
        type: "image/svg+xml"
      }]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const manifestURL = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestURL;
    document.head.appendChild(link);
  </script>

</body>
</html>
